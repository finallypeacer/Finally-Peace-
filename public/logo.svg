<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 52">
  <defs>
    <linearGradient id="inf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="fth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Infinity symbol -->
  <g transform="translate(42,26)">
    <ellipse cx="-18" cy="0" rx="17" ry="13" fill="none" stroke="url(#inf)" stroke-width="5.5" stroke-linecap="round"/>
    <ellipse cx="18"  cy="0" rx="17" ry="13" fill="none" stroke="url(#inf)" stroke-width="5.5" stroke-linecap="round"/>
  </g>

  <!-- Feather through the infinity -->
  <g transform="translate(42,5) rotate(-36, 0, 21)">
    <line x1="0" y1="0" x2="0" y2="42" stroke="url(#fth)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M0,4  Q-9,9  -12,16"  fill="none" stroke="url(#fth)" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,13 Q-10,18 -13,26" fill="none" stroke="url(#fth)" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    <path d="M0,22 Q-9,27  -11,34" fill="none" stroke="url(#fth)" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
    <path d="M0,4  Q9,9  12,16"    fill="none" stroke="url(#fth)" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,13 Q10,18 13,26"   fill="none" stroke="url(#fth)" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    <path d="M0,22 Q9,27  11,34"   fill="none" stroke="url(#fth)" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
    <path d="M0,0 Q1.5,4 0,8 Q-1.5,4 0,0" fill="#60a5fa"/>
  </g>

  <!-- Sparkles -->
  <g fill="#3b82f6" opacity="0.7">
    <path d="M14,10 l2,4 l2,-4 l-2,-4 Z"/>
    <path d="M20,7  l1,2.5 l1,-2.5 l-1,-2.5 Z" opacity="0.6"/>
    <path d="M72,10 l2,4 l2,-4 l-2,-4 Z"/>
    <path d="M78,7  l1,2.5 l1,-2.5 l-1,-2.5 Z" opacity="0.6"/>
    <path d="M42,4  l1.5,3.5 l1.5,-3.5 l-1.5,-3.5 Z"/>
  </g>

  <!-- "Finally Peace" text -->
  <text x="96" y="34" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-size="28" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Finally Peace</text>
</svg>
