<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="inf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="fth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff" rx="90"/>

  <!-- Infinity symbol centered large -->
  <g transform="translate(256,205)">
    <ellipse cx="-80" cy="0" rx="76" ry="55" fill="none" stroke="url(#inf)" stroke-width="28" stroke-linecap="round"/>
    <ellipse cx="80"  cy="0" rx="76" ry="55" fill="none" stroke="url(#inf)" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- Feather -->
  <g transform="translate(256,95) rotate(-38, 0, 110)">
    <line x1="0" y1="0" x2="0" y2="220" stroke="url(#fth)" stroke-width="7" stroke-linecap="round"/>
    <path d="M0,22  Q-46,40 -56,72"  fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,60  Q-50,78 -60,112" fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M0,98  Q-48,116 -54,150" fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M0,134 Q-40,150 -42,180" fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,22  Q46,40 56,72"    fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M0,60  Q50,78 60,112"   fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.85"/>
    <path d="M0,98  Q48,116 54,150"  fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M0,134 Q40,150 42,180"  fill="none" stroke="url(#fth)" stroke-width="5.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,0 Q6,18 0,36 Q-6,18 0,0" fill="#93c5fd"/>
  </g>

  <!-- Sparkles -->
  <g fill="#3b82f6">
    <path d="M108,118 l7,16 l7,-16 l-7,-16 Z" opacity="0.7"/>
    <path d="M136,96  l4,9  l4,-9  l-4,-9  Z" opacity="0.5"/>
    <path d="M376,118 l7,16 l7,-16 l-7,-16 Z" opacity="0.7"/>
    <path d="M390,96  l4,9  l4,-9  l-4,-9  Z" opacity="0.5"/>
    <path d="M256,82  l5,12 l5,-12 l-5,-12 Z" opacity="0.8"/>
  </g>

  <!-- Finally Peace text -->
  <text x="256" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#0f172a" letter-spacing="-1">Finally Peace</text>
  <text x="256" y="416" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#2563eb" font-style="italic">Infinite care. Infinite peace.</text>
</svg>
